
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- Hace que el diseño se adapte al ancho del dispositivo -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Botón centrado y responsivo P</title>
  <style>
    html, body {
      margin: 0;
      height: 90%;              /* ocupa toda la altura disponible */
      display: flex;
      justify-content: center;   /* centra horizontalmente */
      align-items: center;       /* centra verticalmente */
      background-color: #000;
    }

    button {
      padding: 15px 30px;
      font-size: 1.2rem;
      border: none;
      border-radius: 8px;
      background-color: #24292e; /* estilo GitHub */
      color: white;
      cursor: pointer;
      border: solid yellow 0.5px;
      transition: transform 0.2s, background-color 0.3s;
    }

    button:hover {
      background-color: #444c56;
      transform: scale(1.05);
    }
    }
  </style>
</head>
<body>
  <button onclick="window.location.href='https://github.com/CINE-APP/api/releases/download/16/Play-Co-Update.apk'">
    Descargar actualización ?
  </button>
</body>
</html>
